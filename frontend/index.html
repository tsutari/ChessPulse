<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChessPulse</title>

  <!-- chessboard.js styles -->
  <link rel="stylesheet"
    href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css" />

  <!-- jQuery (required by chessboard.js) -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <!-- chess.js (game logic / move validation) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
  <!-- chessboard.js (board UI) -->
  <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #1a1a2e;
      color: #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 32px 16px;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 4px;
      letter-spacing: -0.5px;
    }

    h1 span { color: #e94560; }

    .subtitle {
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 28px;
    }

    .layout {
      display: flex;
      gap: 28px;
      align-items: flex-start;
      flex-wrap: wrap;
      justify-content: center;
    }

    #board-wrap { width: 480px; }

    .sidebar {
      width: 240px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .card {
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 10px;
      padding: 16px;
    }

    .card h3 {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #888;
      margin-bottom: 10px;
    }

    #status {
      font-size: 1rem;
      font-weight: 600;
      min-height: 24px;
    }

    #status.error   { color: #e94560; }
    #status.thinking { color: #f5a623; }
    #status.ok      { color: #7ed56f; }

    #last-move {
      font-size: 0.9rem;
      font-family: monospace;
      color: #a8d8ea;
      margin-top: 8px;
      min-height: 18px;
    }

    .depth-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .depth-row label { font-size: 0.85rem; color: #aaa; white-space: nowrap; }

    input[type=range] { flex: 1; accent-color: #e94560; }

    #depth-val {
      font-size: 0.85rem;
      font-family: monospace;
      width: 20px;
      text-align: right;
    }

    .btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .btn:hover    { opacity: 0.85; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-primary  { background: #e94560; color: #fff; }
    .btn-secondary { background: #0f3460; color: #eee; }

    #move-list {
      font-family: monospace;
      font-size: 0.82rem;
      color: #ccc;
      max-height: 160px;
      overflow-y: auto;
      line-height: 1.8;
      word-break: break-word;
    }

    .spinner {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid #f5a623;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #confidence-chart { width: 100% !important; height: 120px !important; }

    #leaderboard-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
    #leaderboard-table th { color: #888; font-weight: 600; text-align: left; padding: 4px 6px; border-bottom: 1px solid #0f3460; }
    #leaderboard-table td { color: #ccc; padding: 4px 6px; border-bottom: 1px solid #0f3460; }
    #leaderboard-table tr:last-child td { border-bottom: none; }

    #board-wrap { transition: opacity 0.2s; }
    #board-wrap.dimmed { opacity: 0.75; }

    #thinking-overlay {
      display: none;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
      font-size: 0.9rem;
      color: #ff4d5a;
      font-weight: 600;
    }
    #thinking-overlay.visible { display: flex; }
    #thinking-overlay .think-spin {
      width: 16px; height: 16px; flex-shrink: 0;
      border: 2px solid rgba(255,77,90,0.25);
      border-top-color: #ff4d5a;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
  </style>
</head>
<body>

<h1>Chess<span>Pulse</span></h1>
<p class="subtitle">Neural Chess Engine &mdash; Real-time AI Analysis</p>

<div class="layout">
  <div id="board-wrap">
    <div id="board"></div>
  </div>

  <div class="sidebar">
    <div class="card">
      <h3>Status</h3>
      <div id="status" class="ok">Your move</div>
      <div id="thinking-overlay"><div class="think-spin"></div>AI thinking…</div>
      <div id="last-move"></div>
      <div id="confidence" style="font-size:0.85rem;margin-top:6px;font-weight:600"></div>
    </div>

    <div class="card">
      <h3>AI Difficulty</h3>
      <div class="depth-row">
        <label>Depth</label>
        <input type="range" id="depth" min="1" max="20" value="10" />
        <span id="depth-val">10</span>
      </div>
    </div>

    <button class="btn btn-primary"   id="btn-new">New Game</button>
    <button class="btn btn-secondary" id="btn-flip">Flip Board</button>

    <div class="card">
      <h3>Confidence Trend</h3>
      <canvas id="confidence-chart"></canvas>
    </div>

    <div class="card">
      <h3>Leaderboard</h3>
      <table id="leaderboard-table">
        <thead><tr><th>Player</th><th>Result</th><th>Moves</th></tr></thead>
        <tbody id="leaderboard-body"><tr><td colspan="3" style="color:#555">No entries yet</td></tr></tbody>
      </table>
    </div>

    <div class="card">
      <h3>Move History</h3>
      <div id="move-list">—</div>
    </div>
  </div>
</div>

<script>
  const API = "https://chesspulse-5j4h.onrender.com";

  const game = new Chess();
  let board, waiting = false, moveHistory = [];
  let confidenceHistory = [], trendChart = null;

  // ── helpers ──────────────────────────────────────────────────────────────

  function setStatus(html, cls) {
    const el = document.getElementById("status");
    el.innerHTML = html;
    el.className = cls || "";
  }

  function updateMoveList() {
    const el = document.getElementById("move-list");
    if (!moveHistory.length) { el.textContent = "—"; return; }
    let html = "";
    for (let i = 0; i < moveHistory.length; i += 2) {
      const n = Math.floor(i / 2) + 1;
      html += `<span style="color:#666">${n}.</span> ${moveHistory[i] || ""} ${moveHistory[i + 1] || ""}  `;
    }
    el.innerHTML = html;
    el.scrollTop = el.scrollHeight;
  }

  function checkGameOver() {
    if (!game.game_over()) return false;
    if (game.in_checkmate()) {
      const winner = game.turn() === "w" ? "Black wins!" : "White wins!";
      setStatus("Checkmate — " + winner, "ok");
      handleCheckmate(winner);
    } else if (game.in_stalemate()) {
      setStatus("Stalemate — draw", "ok");
    } else if (game.in_draw()) {
      setStatus("Draw", "ok");
    } else {
      setStatus("Game over", "ok");
    }
    waiting = true;   // block further input
    return true;
  }

  // ── board callbacks ───────────────────────────────────────────────────────

  function onDragStart(src, piece) {
    if (waiting || game.game_over()) return false;
    if (game.turn() !== "w") return false;          // only white's turn
    if (piece.startsWith("b")) return false;        // can't drag black pieces
    return true;
  }

  function onDrop(src, dst) {
    const move = game.move({ from: src, to: dst, promotion: "q" });
    if (!move) return "snapback";                   // illegal move

    moveHistory.push(move.san);
    updateMoveList();
    board.position(game.fen());

    if (checkGameOver()) return;

    setStatus("", "thinking");
    document.getElementById("last-move").textContent = "";
    waiting = true;
    setTimeout(() => {
      requestAnimationFrame(fetchAIMove);
    }, 300);
  }

  function onSnapEnd() { board.position(game.fen()); }

  // ── AI call ───────────────────────────────────────────────────────────────

  async function fetchAIMove() {
    const depth = document.getElementById("depth").value;
    const url   = `${API}/move?fen=${encodeURIComponent(game.fen())}&depth=${depth}`;
    try {
      const res  = await fetch(url);
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || `HTTP ${res.status}`);

      if (!data.move) throw new Error("No move returned from API");
      const uci  = data.move;                       // e.g. "e7e5"
      const from = uci.slice(0, 2);
      const to   = uci.slice(2, 4);
      const promo = uci[4] || "q";

      const mv = game.move({ from, to, promotion: promo });
      if (!mv) throw new Error(`AI returned illegal move: ${uci}`);

      moveHistory.push(mv.san);
      updateMoveList();
      board.position(game.fen());
      document.getElementById("last-move").textContent = `AI: ${mv.san} (${uci})`;
      if (data.confidence != null) {
        const pct = Math.round(data.confidence * 100);
        const color = data.confidence >= 0.6 ? "#7ed56f"
                    : data.confidence >= 0.4 ? "#f5a623"
                    : "#e94560";
        const el = document.getElementById("confidence");
        el.textContent = `AI Confidence: ${pct}%`;
        el.style.color = color;
        confidenceHistory.push(pct);
        trendChart.data.labels = confidenceHistory.map((_, i) => i + 1);
        trendChart.data.datasets[0].data = confidenceHistory;
        trendChart.update();
      }

      if (!checkGameOver()) setStatus("Your move", "ok");
    } catch (err) {
      game.undo();                      // roll back white's move so game is playable
      board.position(game.fen());
      setStatus("Error: " + err.message, "error");
    } finally {
      waiting = false;
    }
  }

  // ── init ──────────────────────────────────────────────────────────────────

  board = Chessboard("board", {
    draggable: true,
    position: "start",
    onDragStart,
    onDrop,
    onSnapEnd,
    pieceTheme: "https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png",
  });

  trendChart = new Chart(document.getElementById("confidence-chart"), {
    type: "line",
    data: {
      labels: [],
      datasets: [{
        data: [],
        borderColor: "#ff4d5a",
        borderWidth: 2,
        pointRadius: 3,
        pointBackgroundColor: "#ff4d5a",
        tension: 0.3,
        fill: false,
      }]
    },
    options: {
      animation: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: "#888", font: { size: 10 } }, grid: { color: "#0f3460" } },
        y: { min: 0, max: 100, ticks: { color: "#888", font: { size: 10 } }, grid: { color: "#0f3460" } },
      },
    }
  });

  document.getElementById("btn-new").addEventListener("click", () => {
    game.reset();
    moveHistory = [];
    confidenceHistory = [];
    trendChart.data.labels = [];
    trendChart.data.datasets[0].data = [];
    trendChart.update();
    board.start();
    updateMoveList();
    setStatus("Your move", "ok");
    document.getElementById("last-move").textContent = "";
    document.getElementById("confidence").textContent = "";
    waiting = false;
  });

  document.getElementById("btn-flip").addEventListener("click", () => board.flip());

  const depthInput = document.getElementById("depth");
  const depthVal   = document.getElementById("depth-val");
  depthInput.addEventListener("input", () => { depthVal.textContent = depthInput.value; });

  async function refreshLeaderboard() {
    try {
      const res = await fetch(`${API}/leaderboard`);
      const data = await res.json();
      const tbody = document.getElementById("leaderboard-body");
      if (!data.rows || !data.rows.length) {
        tbody.innerHTML = '<tr><td colspan="3" style="color:#555">No entries yet</td></tr>';
        return;
      }
      tbody.innerHTML = data.rows.map(r =>
        `<tr><td>${r.user}</td><td>${r.result}</td><td>${r.moves}</td></tr>`
      ).join("");
    } catch (_) {}
  }

  async function handleCheckmate(winner) {
    const resultStr = winner.startsWith("White") ? "Win" : "Loss";
    const name = window.prompt("Game over! Enter your name for the leaderboard:");
    if (!name || !name.trim()) return;
    try {
      await fetch(`${API}/submit_result`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          user: name.trim(),
          result: resultStr,
          moves: moveHistory.length,
          timestamp: Math.floor(Date.now() / 1000),
        }),
      });
      refreshLeaderboard();
    } catch (_) {}
  }

  refreshLeaderboard();

  // Dim board and show overlay whenever status has class "thinking"
  new MutationObserver(() => {
    const thinking = document.getElementById("status").classList.contains("thinking");
    document.getElementById("board-wrap").classList.toggle("dimmed", thinking);
    document.getElementById("thinking-overlay").classList.toggle("visible", thinking);
  }).observe(document.getElementById("status"), { attributes: true, attributeFilter: ["class"] });
</script>
</body>
</html>
